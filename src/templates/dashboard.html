<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeminiJobBot | Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #05070a;
            --card-bg: rgba(17, 25, 40, 0.45);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-glow: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        [data-theme="light"] {
            --bg-color: #e2e8f0;
            --card-bg: rgba(255, 255, 255, 0.55);
            --border-color: rgba(255, 255, 255, 0.7);
            --accent-glow: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            --text-color: #111827;
            --text-muted: #4b5563;
            --input-bg: rgba(255, 255, 255, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
            overflow: hidden; /* Prevent body scrolling */
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            width: 100%;
            max-width: 1250px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
            padding: 0.8rem 1.2rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            flex-shrink: 0;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: var(--accent-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-controls {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .toggle-btn {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .toggle-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        main {
            width: 100%;
            max-width: 1250px;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 1rem;
            height: calc(100vh - 120px); /* Strictly constrain height to viewport */
            min-height: 0; /* Important for grid layout children overflow */
        }

        .left-column {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            height: 100%;
            min-height: 0;
        }

        .right-column {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            height: 100%;
            min-height: 0;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            min-height: 0; /* Prevent expanding beyond grid container */
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.15);
        }

        .card-stretch {
            flex-grow: 1;
            min-height: 0; /* Let it shrink and fit */
        }

        h2 {
            font-size: 1.1rem;
            font-weight: 600;
            border-left: 3px solid var(--primary);
            padding-left: 0.6rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        label {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        input[type="text"], input[type="number"], select {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 0.6rem 0.8rem;
            border-radius: 10px;
            color: var(--text-color);
            font-size: 0.85rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }

        input[type="text"]:focus, input[type="number"]:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .checkbox-group {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .checkbox-tile {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 0.5rem 0.8rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .checkbox-tile input {
            accent-color: var(--primary);
        }

        .console {
            background: #111827;
            color: #10b981;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.8rem;
            padding: 1.5rem;
            border-radius: 12px;
            height: 500px;
            overflow-y: auto;
            overflow-x: hidden;
            word-wrap: break-word;
            white-space: pre-wrap;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            line-height: 1.5;
            word-break: break-all;
        }

        .btn {
            background: var(--accent-glow);
            color: #0b0f19;
            border: none;
            padding: 0.8rem 1.2rem;
            font-size: 0.9rem;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn:hover {
            transform: translateY(-1px);
            opacity: 0.95;
        }

        .cv-upload-zone {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s ease;
        }

        .cv-upload-zone:hover {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.03);
        }

        .console-log {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.8rem;
            font-family: monospace;
            font-size: 0.75rem;
            flex-grow: 1;
            overflow-y: scroll; /* Force scrolling context */
            color: #34d399;
            white-space: pre-wrap;
            scrollbar-width: none; /* Hide scrollbar Firefox */
            -ms-overflow-style: none;  /* Hide scrollbar IE/Edge */
        }

        .console-log::-webkit-scrollbar {
            display: none; /* Hide scrollbar Chrome/Safari */
        }

        .cv-list {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            max-height: 100px;
            overflow-y: auto;
        }

        .cv-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.75rem;
        }

        .cv-badge {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            padding: 0.1rem 0.3rem;
            border-radius: 4px;
            font-size: 0.7rem;
        }

        .stepper {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 1250px;
            margin-bottom: 1rem;
            flex-shrink: 0;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1rem 2rem;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }

        .step {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            opacity: 0.4;
            transition: all 0.4s ease;
        }

        .step.active {
            opacity: 1;
        }

        .step.active .step-icon {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 15px var(--primary);
            transform: scale(1.1);
        }
        
        .step.completed .step-icon {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }
        
        .step.error .step-icon {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
            box-shadow: 0 0 15px var(--danger);
        }

        .step-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.8rem;
            transition: all 0.4s ease;
            background: var(--input-bg);
            color: var(--text-muted);
        }

        .step-text {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-color);
        }

        .step-connector {
            flex-grow: 1;
            height: 2px;
            background: var(--border-color);
            margin: 0 1rem;
            align-self: center;
            position: relative;
        }
        
        .step-connector::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: var(--primary);
            transition: width 0.5s ease;
        }
        
        .step.completed + .step-connector::after {
            width: 100%;
        }

        .row-flex {
            display: flex;
            gap: 0.8rem;
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>GeminiJobBot</h1>
            <p id="txt-subtitle" style="font-size: 0.75rem; color: var(--text-muted);">Autonomous Job Application Subagent</p>
        </div>
        
        <div class="header-controls">
            <!-- Language Switcher -->
            <button class="toggle-btn" id="lang-btn" onclick="toggleLanguage()">ES</button>
            
            <!-- Theme Controls -->
            <button class="toggle-btn" onclick="setTheme('light')">☀️</button>
            <button class="toggle-btn" onclick="setTheme('dark')">🌙</button>
            <button class="toggle-btn" onclick="setTheme('system')">🖥️</button>
            
            <div class="status-badge" id="bot-status" style="border: 1px solid var(--success); color: #34d399; font-size:0.75rem; padding: 0.2rem 0.6rem; border-radius: 12px; background: rgba(16, 185, 129, 0.1);">Engine Ready</div>
        </div>
    </header>

    <!-- Visual Progress Stepper -->
    <div class="stepper" id="progress-stepper">
        <div class="step active" id="step-1">
            <div class="step-icon">1</div>
            <div class="step-text" id="lbl-step1">Preparando</div>
        </div>
        <div class="step-connector"></div>
        <div class="step" id="step-2">
            <div class="step-icon">2</div>
            <div class="step-text" id="lbl-step2">Buscando</div>
        </div>
        <div class="step-connector"></div>
        <div class="step" id="step-3">
            <div class="step-icon">3</div>
            <div class="step-text" id="lbl-step3">Analizando / Postulando</div>
        </div>
        <div class="step-connector"></div>
        <div class="step" id="step-4">
            <div class="step-icon">4</div>
            <div class="step-text" id="lbl-step4">Finalizado</div>
        </div>
    </div>

    <main>
        <!-- Left Column: Credentials & Console Logs -->
        <div class="left-column">
            <!-- Credentials API Key -->
            <section class="card">
                <h2 id="title-credentials">Gemini API Configuration</h2>
                <div class="row-flex" style="align-items: flex-end;">
                    <div class="form-group" style="flex: 2;">
                        <label id="lbl-apikey">Gemini API Key</label>
                        <input type="text" id="gemini-apikey" placeholder="Enter API Key here (starts with AIza...)">
                    </div>
                    <div class="form-group" style="flex: 1.2;">
                        <label id="lbl-model">Gemini Model</label>
                        <select id="gemini-model" style="padding: 0.6rem 0.8rem; font-size: 0.85rem;">
                            <option value="gemini-3.5-flash">3.5 Flash (Active Quota)</option>
                            <option value="gemini-2.5-flash-lite">2.5 Flash Lite (Active Quota)</option>
                            <option value="gemini-2.5-flash">2.5 Flash (20 req/day)</option>
                        </select>
                    </div>
                    <button class="btn" style="height: 38px; padding: 0 1rem;" id="btn-save-key" onclick="saveApiKey()">Save Credentials</button>
                </div>
            </section>

            <!-- Console Log -->
            <section class="card card-stretch">
                <h2 id="title-console">Execution Console Logs</h2>
                <div class="console-log" id="console"></div>
            </section>
        </div>

        <!-- Right Column: Params & Configuration -->
        <div class="right-column">
            <!-- Search Settings -->
            <section class="card card-stretch">
                <h2 id="title-settings">Search & Filtering Criteria</h2>
                
                <div class="checkbox-group">
                    <label class="checkbox-tile">
                        <input type="checkbox" name="portals" value="LinkedIn" checked>
                        <span>LinkedIn</span>
                    </label>
                    <label class="checkbox-tile">
                        <input type="checkbox" name="portals" value="Indeed" checked>
                        <span>Indeed</span>
                    </label>
                    <label class="checkbox-tile">
                        <input type="checkbox" name="portals" value="Glassdoor">
                        <span>Glassdoor</span>
                    </label>
                    
                    <!-- Headed Show Browser Toggle -->
                    <label class="checkbox-tile" style="margin-left: auto; border-color: var(--primary);">
                        <input type="checkbox" id="show-browser" checked>
                        <span style="font-weight: 600;" id="lbl-showbrowser">Show Browser</span>
                    </label>
                </div>

                <!-- Row 1: Búsqueda Principal -->
                <div class="row-flex">
                    <div class="form-group" style="flex: 1;">
                        <label id="lbl-jobsource">Job Source / Origen</label>
                        <select id="job-source" onchange="toggleJobSource()" style="padding: 0.6rem 0.8rem; font-size: 0.85rem;">
                            <option value="search">🔍 Portal Live Search</option>
                            <option value="auto">✨ AI Auto Discovery (HR Engine)</option>
                            <option value="imported">🤖 Imported Agent Jobs</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1.5;" id="container-searchquery">
                        <label id="lbl-searchquery">Search Keywords / Role</label>
                        <input type="text" id="search-query" placeholder="e.g. QA Automation" value="QA Automation">
                    </div>
                </div>

                <!-- Row 2: Ubicación y Límites -->
                <div class="row-flex">
                    <div class="form-group" style="flex: 2;">
                        <label id="lbl-location">Target Location</label>
                        <div style="display: flex; gap: 0.3rem;">
                            <input type="text" id="location" placeholder="e.g. Madrid" style="flex: 1.5;" value="Sevilla">
                            <select id="work-model" style="flex: 1; padding: 0.6rem 0.5rem; font-size: 0.8rem;">
                                <option value="Any">🌐 Any</option>
                                <option value="Remote">🏠 Remote</option>
                                <option value="Hybrid">🏢 Hybrid</option>
                                <option value="On-site">📍 On-site</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group" style="flex: 0.8;">
                        <label id="lbl-maxapps">Max Apps</label>
                        <input type="number" id="max-applications" value="2" min="1" max="100">
                    </div>
                </div>

                <!-- Row 3: Filtros Económicos y Nivel -->
                <div class="row-flex">
                    <div class="form-group" style="flex: 1.5;">
                        <label id="lbl-minsalary">Minimum Salary Target</label>
                        <div style="display: flex; gap: 0.3rem;">
                            <input type="number" id="min-salary" value="12000">
                            <select id="salary-currency" style="width: 80px;">
                                <option value="EUR">EUR (€)</option>
                                <option value="USD">USD ($)</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group" style="flex: 1;">
                        <label id="lbl-exp">Experience (Years)</label>
                        <div style="display: flex; gap: 0.3rem; align-items: center;">
                            <input type="number" id="exp-min" value="0">
                            <span>-</span>
                            <input type="number" id="exp-max" value="1">
                        </div>
                    </div>
                </div>

                <!-- Row 4: Palabras clave -->
                <div class="form-group">
                    <label id="lbl-keywords">Target Keywords (Comma Separated)</label>
                    <input type="text" id="target-keywords" value="Linux, QA, SDET, Python, Docker, Bash, Swift, LangChain, CI/CD, Automation, Testing">
                </div>

                <!-- Integrated Candidate Resume Profiles -->
                <div style="border-top: 1px solid var(--border-color); padding-top: 0.8rem; display: flex; flex-direction: column; gap: 0.6rem;">
                    <h2 id="title-profiles" style="font-size: 1.1rem; font-weight: 600; border-left: 3px solid var(--primary); padding-left: 0.6rem;">Candidate Resume Profiles</h2>
                    
                    <div class="row-flex" style="align-items: flex-end; gap: 0.8rem;">
                        <div class="form-group" style="flex: 1.5;">
                            <label id="lbl-activecv" style="font-size: 0.8rem; color: var(--text-muted); font-weight: 600;">Active CV Guide File</label>
                            <select id="active-cv" style="padding: 0.6rem 0.8rem; font-size: 0.85rem;">
                                <option value="auto">🤖 AI Dynamic Routing (Multi-profile)</option>
                            </select>
                        </div>
                        <div class="cv-upload-zone" onclick="document.getElementById('cv-file-input').click()" style="flex: 1; padding: 0.5rem 0.8rem; border-radius: 10px; border: 2px dashed var(--border-color); font-size: 0.75rem;">
                            <input type="file" id="cv-file-input" style="display: none;" onchange="uploadCV(event)">
                            <p id="lbl-dragtext" style="font-weight: 600; margin: 0;">Upload CV PDF/TXT</p>
                            <p id="lbl-clicktext" style="font-size: 0.65rem; color: var(--text-muted); margin: 0;">Click to browse</p>
                        </div>
                    </div>
                    <div class="cv-list" id="cv-items-container" style="max-height: 80px; display: flex; flex-direction: column; gap: 0.4rem; overflow-y: auto;"></div>
                </div>

                <div class="row-flex" style="margin-top: auto; padding-top: 0.8rem; border-top: 1px solid var(--border-color);">
                    <button class="btn btn-secondary" style="flex: 1; background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-color);" id="btn-save-cfg" onclick="saveSettings()">Save Configuration</button>
                    <button class="btn" style="flex: 1.5;" id="btn-run" onclick="runAgent()">Start Automation Loop</button>
                </div>
            </section>
        </div>
    </main>

    <script>
        let currentLang = 'ES';
        let logPoller = null;

        const translations = {
            EN: {
                subtitle: "Autonomous Job Application Subagent",
                title_credentials: "Gemini API Configuration",
                lbl_apikey: "Gemini API Key",
                btn_save_key: "Save Key",
                title_settings: "Search & Filtering Criteria",
                lbl_searchquery: "Search Keywords / Role",
                lbl_location: "Target Location",
                lbl_maxapps: "Max Applications",
                lbl_minsalary: "Minimum Salary Target",
                lbl_exp: "Experience (Years)",
                lbl_keywords: "Target Keywords (Comma Separated)",
                btn_save_cfg: "Save Configuration",
                btn_run: "Start Automation Loop",
                title_profiles: "Candidate Resume Profiles",
                lbl_activecv: "Active CV Guide File",
                lbl_dragtext: "Drag PDF / TXT CV here",
                lbl_clicktext: "Or click to browse from system",
                title_console: "Execution Console Logs",
                log_init: "Dashboard console initialized. Setup parameters above and run the subagent.",
                lbl_showbrowser: "Show Browser",
                lbl_model: "Gemini Model",
                step_1: "Preparing",
                step_2: "Searching Jobs",
                step_3: "Applying",
                step_4: "Finished"
            },
            ES: {
                subtitle: "Subagente Autónomo de Postulación de Empleo",
                title_credentials: "Configuración de API de Gemini",
                lbl_apikey: "Clave de API de Gemini",
                btn_save_key: "Guardar Clave",
                title_settings: "Criterios de Búsqueda y Filtrado",
                lbl_searchquery: "Término de Búsqueda / Rol",
                lbl_location: "Ubicación Objetivo",
                lbl_maxapps: "Límite Postulaciones",
                lbl_minsalary: "Salario Mínimo Objetivo",
                lbl_exp: "Experiencia (Años)",
                lbl_keywords: "Palabras Clave Requeridas (Separadas por comas)",
                btn_save_cfg: "Guardar Ajustes",
                btn_run: "Iniciar Automatización",
                title_profiles: "Perfiles de Currículums de Candidatos",
                lbl_activecv: "Currículum Activo de Referencia",
                lbl_dragtext: "Arrastra tu currículum PDF o TXT aquí",
                lbl_clicktext: "O haz clic para explorar en tu equipo",
                title_console: "Consola de Registros de Ejecución",
                log_init: "Consola del panel inicializada. Configura los parámetros arriba e inicia el subagente.",
                lbl_showbrowser: "Mostrar Navegador",
                lbl_model: "Modelo Gemini",
                step_1: "Preparando",
                step_2: "Buscando Vacantes",
                step_3: "Postulando",
                step_4: "Finalizado"
            }
        };

        window.onload = function() {
            setTheme('system');
            try {
                const savedState = localStorage.getItem('jobBotUiState');
                if (savedState) {
                    const state = JSON.parse(savedState);
                    if (state.model) document.getElementById('gemini-model').value = state.model;
                    if (state.source) {
                        document.getElementById('job-source').value = state.source;
                        toggleJobSource();
                    }
                    if (state.query) document.getElementById('search-query').value = state.query;
                    if (state.location) document.getElementById('location').value = state.location;
                    if (state.workModel) document.getElementById('work-model').value = state.workModel;
                    if (state.maxApps) document.getElementById('max-applications').value = state.maxApps;
                    if (state.showBrowser !== undefined) document.getElementById('show-browser').checked = state.showBrowser;
                    if (state.portals) {
                        document.querySelectorAll('input[name="portals"]').forEach(cb => {
                            cb.checked = state.portals.includes(cb.value);
                        });
                    }
                }
            } catch (e) { console.error("Error loading localStorage state"); }
            
            loadApiKey();
            loadConfig();
            loadCVs();
            applyTranslations();
            addLog(translations[currentLang].log_init);
        };

        function setTheme(theme) {
            const htmlEl = document.documentElement;
            if (theme === 'system') {
                const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                htmlEl.setAttribute('data-theme', systemDark ? 'dark' : 'light');
            } else {
                htmlEl.setAttribute('data-theme', theme);
            }
        }

        function toggleLanguage() {
            currentLang = currentLang === 'ES' ? 'EN' : 'ES';
            document.getElementById('lang-btn').textContent = currentLang === 'ES' ? 'EN' : 'ES';
            applyTranslations();
        }

        function applyTranslations() {
            const t = translations[currentLang];
            document.getElementById('txt-subtitle').textContent = t.subtitle;
            document.getElementById('title-credentials').textContent = t.title_credentials;
            document.getElementById('lbl-apikey').textContent = t.lbl_apikey;
            document.getElementById('btn-save-key').textContent = t.btn_save_key;
            document.getElementById('title-settings').textContent = t.title_settings;
            document.getElementById('lbl-searchquery').textContent = t.lbl_searchquery;
            document.getElementById('lbl-location').textContent = t.lbl_location;
            document.getElementById('lbl-maxapps').textContent = t.lbl_maxapps;
            document.getElementById('lbl-minsalary').textContent = t.lbl_minsalary;
            document.getElementById('lbl-exp').textContent = t.lbl_exp;
            document.getElementById('lbl-keywords').textContent = t.lbl_keywords;
            document.getElementById('btn-save-cfg').textContent = t.btn_save_cfg;
            document.getElementById('btn-run').textContent = t.btn_run;
            document.getElementById('title-profiles').textContent = t.title_profiles;
            document.getElementById('lbl-activecv').textContent = t.lbl_activecv;
            document.getElementById('lbl-dragtext').textContent = t.lbl_dragtext;
            document.getElementById('lbl-clicktext').textContent = t.lbl_clicktext;
            document.getElementById('title-console').textContent = t.title_console;
            document.getElementById('lbl-showbrowser').textContent = t.lbl_showbrowser;
            document.getElementById('lbl-model').textContent = t.lbl_model;
            
            if (document.getElementById('lbl-step1')) {
                document.getElementById('lbl-step1').textContent = t.step_1;
                document.getElementById('lbl-step2').textContent = t.step_2;
                document.getElementById('lbl-step3').textContent = t.step_3;
                document.getElementById('lbl-step4').textContent = t.step_4;
            }
        }

        function addLog(message, isErr = false) {
            const consoleDiv = document.getElementById("console");
            const entry = document.createElement("div");
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            if (isErr) entry.style.color = '#ef4444';
            
            if (message.includes("[ACTION_REQUIRED]")) {
                entry.style.color = '#f59e0b'; // Amber
                entry.style.fontWeight = 'bold';
                
                const statusDiv = document.getElementById('bot-status');
                if (statusDiv) {
                    statusDiv.textContent = window.currentLang === 'ES' ? 'Aviso: Acción Requerida' : 'Notice: Action Required';
                    statusDiv.style.borderColor = '#f59e0b';
                    statusDiv.style.color = '#f59e0b';
                    statusDiv.style.background = 'rgba(245, 158, 11, 0.1)';
                }
            }
            
            consoleDiv.appendChild(entry);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        async function loadApiKey() {
            try {
                const res = await fetch('/api/apikey');
                const data = await res.json();
                if (data.gemini_api_key) {
                    document.getElementById('gemini-apikey').value = data.gemini_api_key;
                }
                if (data.gemini_model) {
                    document.getElementById('gemini-model').value = data.gemini_model;
                }
            } catch (err) {
                addLog("Error loading Gemini API Key status.", true);
            }
        }

        async function saveApiKey() {
            const keyVal = document.getElementById('gemini-apikey').value;
            const modelVal = document.getElementById('gemini-model').value;
            try {
                const res = await fetch('/api/apikey', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ gemini_api_key: keyVal, gemini_model: modelVal })
                });
                if (res.ok) {
                    addLog("Gemini API credentials updated successfully.");
                    loadApiKey();
                } else {
                    addLog("Failed to save Gemini API credentials.", true);
                }
            } catch (err) {
                addLog("Connection error saving API credentials.", true);
            }
        }

        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                const data = await res.json();
                
                document.getElementById('min-salary').value = data.filtering_rules.minimum_salary;
                document.getElementById('salary-currency').value = data.filtering_rules.currency || 'EUR';
                document.getElementById('exp-min').value = data.filtering_rules.experience_years_range.min;
                document.getElementById('exp-max').value = data.filtering_rules.experience_years_range.max;
                document.getElementById('target-keywords').value = data.filtering_rules.target_keywords.join(', ');
                
                addLog("Configuración cargada del servidor.");
            } catch (err) {
                addLog("Error al sincronizar configuración del servidor.", true);
            }
        }

        async function saveSettings() {
            const minSalary = parseInt(document.getElementById('min-salary').value);
            const currency = document.getElementById('salary-currency').value;
            const expMin = parseInt(document.getElementById('exp-min').value);
            const expMax = parseInt(document.getElementById('exp-max').value);
            const keywords = document.getElementById('target-keywords').value.split(',').map(k => k.trim());
            
            // Save UI state to localStorage
            const uiState = {
                model: document.getElementById('gemini-model').value,
                source: document.getElementById('job-source').value,
                query: document.getElementById('search-query').value,
                location: document.getElementById('location').value,
                workModel: document.getElementById('work-model').value,
                maxApps: document.getElementById('max-applications').value,
                showBrowser: document.getElementById('show-browser').checked,
                portals: Array.from(document.querySelectorAll('input[name="portals"]:checked')).map(cb => cb.value)
            };
            localStorage.setItem('jobBotUiState', JSON.stringify(uiState));

            const payload = {
                minimum_salary: minSalary,
                currency: currency,
                experience_years_range: { min: expMin, max: expMax },
                target_keywords: keywords
            };
            
            try {
                const res = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    addLog("Ajustes guardados correctamente.");
                } else {
                    addLog("Error al guardar ajustes en servidor.", true);
                }
            } catch (err) {
                addLog("Fallo al guardar ajustes.", true);
            }
        }

        async function loadCVs() {
            try {
                const res = await fetch('/api/cvs');
                const files = await res.json();
                const container = document.getElementById('cv-items-container');
                const select = document.getElementById('active-cv');
                
                container.innerHTML = '';
                select.innerHTML = '';
                
                const autoOpt = document.createElement('option');
                autoOpt.value = 'auto';
                autoOpt.textContent = currentLang === 'ES' ? '🤖 Ruteo Inteligente por IA (Multiperfil)' : '🤖 AI Auto-Routing (Multi-profile)';
                select.appendChild(autoOpt);
                
                files.forEach(file => {
                    const opt = document.createElement('option');
                    opt.value = `profiles/${file.name}`;
                    opt.textContent = `${file.name} (${file.type.toUpperCase()})`;
                    select.appendChild(opt);
                    
                    const item = document.createElement('div');
                    item.className = 'cv-item';
                    item.innerHTML = `
                        <span>${file.name}</span>
                        <div class="cv-badge">${file.type.toUpperCase()}</div>
                    `;
                    container.appendChild(item);
                });
            } catch (err) {
                addLog("Could not load resumes directory.", true);
            }
        }

        async function uploadCV(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('file', file);
            addLog(`Ingesting file '${file.name}' into profiles...`);
            
            try {
                const res = await fetch('/api/cvs/upload', {
                    method: 'POST',
                    body: formData
                });
                if (res.ok) {
                    addLog(`Ingestion successful. '${file.name}' parsed.`);
                    loadCVs();
                } else {
                    addLog("Failed uploading CV.", true);
                }
            } catch (err) {
                addLog("Ingestion connection failed.", true);
            }
        }

        function toggleJobSource() {
            const source = document.getElementById('job-source').value;
            const queryContainer = document.getElementById('container-searchquery');
            const portalCheckboxes = document.querySelectorAll('input[name="portals"]');
            
            if (source === 'imported' || source === 'auto') {
                queryContainer.style.opacity = '0.5';
                document.getElementById('search-query').disabled = true;
                
                if (source === 'imported') {
                    portalCheckboxes.forEach(cb => {
                        cb.disabled = true;
                        cb.parentElement.style.opacity = '0.5';
                    });
                    loadDiscoveredJobsCount();
                } else {
                    // Auto Discovery mode enables portals
                    portalCheckboxes.forEach(cb => {
                        cb.disabled = false;
                        cb.parentElement.style.opacity = '1';
                    });
                }
            } else {
                queryContainer.style.opacity = '1';
                document.getElementById('search-query').disabled = false;
                portalCheckboxes.forEach(cb => {
                    cb.disabled = false;
                    cb.parentElement.style.opacity = '1';
                });
            }
        }
        
        function setStep(stepNum, status = 'active') {
            const steps = [1, 2, 3, 4];
            steps.forEach(num => {
                const stepEl = document.getElementById(`step-${num}`);
                if (!stepEl) return;
                
                if (status === 'error') {
                    if (num === stepNum) {
                        stepEl.className = 'step active error';
                    } else if (num < stepNum) {
                        stepEl.className = 'step completed';
                    } else {
                        stepEl.className = 'step';
                    }
                    return;
                }

                if (num < stepNum) {
                    stepEl.className = 'step completed';
                } else if (num === stepNum) {
                    stepEl.className = 'step active';
                } else {
                    stepEl.className = 'step';
                }
            });
        }
        
        async function loadDiscoveredJobsCount() {
            try {
                const res = await fetch('/api/discovered');
                const data = await res.json();
                const jobs = data.jobs || [];
                addLog(currentLang === 'ES' 
                    ? `Se encontraron ${jobs.length} oferta(s) descubierta(s) por el agente en workflows/checkpoints/discovered_jobs.json`
                    : `Found ${jobs.length} pre-discovered job(s) from agent in workflows/checkpoints/discovered_jobs.json`);
            } catch (err) {
                console.error(err);
            }
        }

        async function runAgent() {
            const source = document.getElementById('job-source').value;
            let query = document.getElementById('search-query').value;
            if (source === 'imported') {
                query = '__imported__';
            } else if (source === 'auto') {
                query = '__auto__';
            }
            const limit = parseInt(document.getElementById('max-applications').value);
            const locationVal = document.getElementById('location').value;
            const workModelVal = document.getElementById('work-model').value;
            const cvPath = document.getElementById('active-cv').value;
            const showBrowser = document.getElementById('show-browser').checked;
            
            const portalCheckboxes = document.querySelectorAll('input[name="portals"]:checked');
            const portals = Array.from(portalCheckboxes).map(cb => cb.value);
            
            if (source !== 'imported' && portals.length === 0) {
                addLog("Please select at least one portal.", true);
                return;
            }
            
            document.getElementById('bot-status').textContent = currentLang === 'ES' ? 'Buscando...' : 'Running...';
            document.getElementById('bot-status').style.borderColor = '#3b82f6';
            document.getElementById('bot-status').style.color = '#3b82f6';
            document.getElementById('bot-status').style.background = 'rgba(59, 130, 246, 0.1)';
            
            document.getElementById("console").innerHTML = "";
            addLog(currentLang === 'ES' ? "Automatización iniciada en segundo plano..." : "Background worker started. Listening to live logs...");
            
            setStep(1); // Reset stepper to Preparing
            
            try {
                const res = await fetch('/api/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        search_query: query,
                        location: locationVal,
                        work_model: workModelVal,
                        max_applications: limit,
                        portals: source === 'imported' ? ['LinkedIn'] : portals,
                        cv_path: cvPath,
                        headless: !showBrowser
                    })
                });
                
                if (res.ok) {
                    let lastLogIndex = 0;
                    if (logPoller) clearInterval(logPoller);
                    
                    logPoller = setInterval(async () => {
                        try {
                            const logsRes = await fetch('/api/run/logs');
                            const logsData = await logsRes.json();
                            const logs = logsData.logs || [];
                            
                            if (logs.length > lastLogIndex) {
                                for (let i = lastLogIndex; i < logs.length; i++) {
                                    const logLine = logs[i];
                                    addLog(logLine);
                                    
                                    // Stepper logic based on logs
                                    const lowerLog = logLine.toLowerCase();
                                    if (lowerLog.includes("executing search on portal") || lowerLog.includes("auto discovery mode active")) {
                                        setStep(2);
                                    } else if (lowerLog.includes("comparing job description") || lowerLog.includes("processing candidate job") || lowerLog.includes("fill_form_agentic")) {
                                        setStep(3);
                                    }
                                }
                                lastLogIndex = logs.length;
                            }
                            
                            const lastLine = logs[logs.length - 1] || "";
                            if (lastLine.includes("Pipeline finished")) {
                                clearInterval(logPoller);
                                setStep(4);
                                document.getElementById('bot-status').textContent = currentLang === 'ES' ? 'Completado' : 'Finished';
                                document.getElementById('bot-status').style.borderColor = '#10b981';
                                document.getElementById('bot-status').style.color = '#34d399';
                                document.getElementById('bot-status').style.background = 'rgba(16, 185, 129, 0.1)';
                            } else if (lastLine.includes("Fatal error") || lastLine.includes("Aborting")) {
                                clearInterval(logPoller);
                                setStep(4, 'error');
                                document.getElementById('bot-status').textContent = 'Error';
                                document.getElementById('bot-status').style.borderColor = '#ef4444';
                                document.getElementById('bot-status').style.color = '#ef4444';
                                document.getElementById('bot-status').style.background = 'rgba(239, 68, 68, 0.1)';
                            }
                        } catch (err) {
                            console.error("Polling error", err);
                        }
                    }, 1500);
                } else {
                    const result = await res.json();
                    addLog(`Execution Error: ${result.detail}`, true);
                    document.getElementById('bot-status').textContent = currentLang === 'ES' ? 'Listo' : 'Engine Ready';
                }
            } catch (err) {
                addLog("Connection failed to start pipeline.", true);
                document.getElementById('bot-status').textContent = currentLang === 'ES' ? 'Listo' : 'Engine Ready';
            }
        }
    </script>
